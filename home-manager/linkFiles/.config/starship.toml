add_newline = false

[character]
error_symbol = "[✗](bold red)"

[shell]
disabled = false
format = '[$indicator]($style)' # No space so that it disappears for bash
bash_indicator = '' # Don't display for bash as it's my default shell and I don't want the clutter
nu_indicator = 'λ'

[nix_shell]
heuristic = true # Attempts to catch the new style `nix shell` subshells

[status]
disabled = false

[line_break]
disabled = true

[directory]
fish_style_pwd_dir_length = 1

[cmd_duration]
min_time = 2_000

[git_status]
# Prevent long loading times
disabled = true
# Count changes
untracked_count.enabled = true
modfied_count.enabled = true
show_sync_count.enabled = true

[custom.taskwarrior-duetoday]
description = "Shows a 🚨 emoji when there are (Taskwarrior) tasks due today"
when = 'test "$(task count +DUETODAY -OVERDUE)" -gt 0'
symbol = '🚨 '
command = "task +DUETODAY -OVERDUE export | jq -r '. | map(.description) | join(\"|\")'"

[custom.taskwarrior-overdue]
description = "Shows a 💀 emoji when there are overdue (Taskwarrior) tasks"
when = 'test "$(task count +OVERDUE)" -gt 0'
symbol = '💀 '
command = "task +OVERDUE export | jq -r '. | map(.description) | join(\"|\")'"
